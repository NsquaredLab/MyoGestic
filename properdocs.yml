          - EMG classification: tutorials/emg-classification.md
          - EMG regression with VHI: tutorials/emg-regression-with-vhi.md
          - Examples directory: tutorials/examples-index.md
      - How-to:
          - how-to/index.md
          - Add a custom source: how-to/add-a-source.md
          - Add a custom output: how-to/add-an-output.md
          - Add a custom widget: how-to/add-a-widget.md
          - Add a custom model: how-to/add-a-model.md
          - Enable on-disk recording: how-to/enable-recording.md
          - Record and replay: how-to/record-and-replay.md
          - Record good training data: how-to/record-good-training-data.md
          - Feature extraction cookbook: how-to/feature-extraction-cookbook.md
          - Use the contrib feature set: how-to/use-contrib-features.md
          - Keep state between pipeline stages: how-to/inter-stage-state.md
          - Post-process predictions: how-to/post-process-output.md
          - Integrate the Virtual Hand: how-to/integrate-vhi.md
          - Install the Virtual Hand: how-to/install-vhi.md
          - Run headless (no GUI): how-to/headless-mode.md
  - Concepts:
      - concepts/index.md
      - Architecture: concepts/architecture.md
      - Streams: concepts/streams.md
      - Pipeline: concepts/pipeline.md
      - Recording: concepts/recording.md
      - Widgets: concepts/widgets.md
      - Grid layout: concepts/grid-layout.md
      - Edge trigger: concepts/edge-trigger.md
      - Threading: concepts/threading.md
      - Design principles: concepts/design-principles.md
  - Widget gallery: widget-gallery.md
  - Troubleshooting: troubleshooting.md
  - Reference:
      - reference/index.md
      - API reference:
          - api/index.md
          - Core: api/core.md
          - Sources: api/sources.md
          - Outputs: api/outputs.md
          - Bridges: api/bridges.md
          - ML pipeline: api/ml.md
          - Widgets: api/widgets.md
          - Models: api/models.md
          - Session: api/session.md
          - Filters: api/filters.md
      - API cheatsheet: reference/api-cheatsheet.md
      - Glossary: reference/glossary.md
