[project]
name = "myogestic"
version = "2.0.2"
description = "Real-time biosignal experiment GUI builder"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.12"
keywords = ["emg", "biosignal", "myocontrol", "real-time", "imgui", "gui"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: GNU General Public License v3 (GPLv3)",
    "Operating System :: MacOS",
    "Operating System :: POSIX :: Linux",
    "Operating System :: Microsoft :: Windows",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
]
dependencies = [
    "dvg-ringbuffer>=1.1.0",
    "imgui-bundle>=1.5.0",
    "zarr>=3.0.0",
    "mne-lsl>=1.7.0",
    "numpy>=1.26.0",
    "joblib>=1.3.0",
    "tsdownsample>=0.1.4.1",
    # platformdirs is used by myogestic.tools.install_vhi and
    # myogestic.interfaces to pick a per-user data dir on systems where
    # `<repo>/tools/...` would land in site-packages.
    "platformdirs>=4.0",
    # macOS-only: needed by core._try_set_macos_dock_icon() to swap the Dock
    # icon at runtime (NSApplication.setApplicationIconImage_). GLFW's
    # `glfwSetWindowIcon` is a no-op on Cocoa, so this is the only path
    # without shipping a .app bundle. The PEP 508 marker keeps Linux /
    # Windows installs from pulling it in.
    "pyobjc-framework-Cocoa>=10.0; sys_platform == 'darwin'",
    "typer>=0.12",
]

[project.scripts]
# Console script for installing the Virtual Hand Interface release binary.
# Equivalent to `python -m myogestic.tools.install_vhi`; the entry point
# makes it discoverable to anyone who only `pip install`d the package.
myogestic-install-vhi = "myogestic.tools.install_vhi:main"

[project.urls]
Homepage = "https://nsquaredlab.github.io/MyoGestic/"
Documentation = "https://nsquaredlab.github.io/MyoGestic/"
Repository = "https://github.com/NsquaredLab/MyoGestic"
Issues = "https://github.com/NsquaredLab/MyoGestic/issues"
Changelog = "https://github.com/NsquaredLab/MyoGestic/blob/main/CHANGELOG.md"

[project.optional-dependencies]
brainflow = ["brainflow>=5.12.0"]
bdi = ["biosignal-device-interface>=0.1.0"]
serial = ["pyserial>=3.5"]
zarrs = ["zarrs>=0.2.0"]
# gRPC control plane to the Virtual Hand Interface (VHI). grpcio-tools is only
# needed to regenerate stubs via tools/gen_proto.py; generated _pb2 files are
# committed so a plain install needs only grpcio + protobuf at runtime.
grpc = ["grpcio>=1.60", "grpcio-tools>=1.60", "protobuf>=4.21"]
# Domain-specific: these belong to user code, not the framework.
# `examples` keeps the smoke tests runnable without forcing them on every install.
examples = ["catboost>=1.2.10", "myoverse>=2.0.0", "torch>=2.0", "scikit-learn>=1.4"]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.6.0",
    "catboost>=1.2.10",
    "myoverse>=2.0.0",
    "torch>=2.0",
    "scikit-learn>=1.4",
    # tools/widget_screenshot.py uses Quartz to find its own GUI window
    # for screencapture. Only needed on macOS, only for the screenshot
    # tool - keep it out of runtime by gating on dev + sys_platform.
    "pyobjc-framework-Quartz>=10.0; sys_platform == 'darwin'",
]
docs = [
    "properdocs",
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.27",
    "pymdown-extensions>=10.0",
    "mkdocs-section-index>=0.3",
]

[tool.setuptools.packages.find]
include = ["myogestic*"]

[tool.setuptools.package-data]
# Ship the branding assets (icon + wordmark) and the gRPC proto inside the
# wheel; without this, `pip install myogestic` would land them in the
# wrong place (or skip them) and image_from_asset / gen_proto would fail.
myogestic = ["assets/**/*", "vhi/_proto/*.proto"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["tests"]
norecursedirs = ["tools", "examples", ".venv", "*.egg-info", "sessions", "*.zarr"]

[tool.ty.src]
# Generated gRPC stubs (mirror the ruff exclude): the proto-compiler output
# trips type-checkers (e.g. EnumTypeWrapper metaclass clashes) and must not be
# edited, so keep it out of type checking entirely.
exclude = ["myogestic/vhi/_proto"]

[tool.ty.rules]
# Project policy uses bare `# type: ignore` (ty does not honor bracketed
# codes). Several guard the optional/untyped `pyserial` import and the
# dvg-ringbuffer `dtype=` tuples; whether ty sees them as "needed" depends on
# which optional extras are installed in the active environment, so do not flag
# them as unused.
unused-type-ignore-comment = "ignore"

[tool.pyright]
# Same generated gRPC stubs as the ruff/ty excludes: pyright flags the
# proto-compiler output (e.g. `grpc.experimental`), which must not be edited.
exclude = ["myogestic/vhi/_proto", "**/.venv", "**/node_modules", "**/__pycache__"]

[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["tools", "sessions", ".venv", "*.egg-info", "*.zarr", ".imgui_state", "myogestic/vhi/_proto", "docs/playground"]

[tool.ruff.lint]
# Conservative defaults â€” catch real issues, don't fight style.
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes (unused, undefined)
    "W",    # pycodestyle warnings
    "B",    # flake8-bugbear (likely-buggy patterns)
    "UP",   # pyupgrade (modernize syntax)
    "I",    # isort (import ordering)
    "SIM",  # flake8-simplify
    "D",    # pydocstyle (docstring presence + NumPy formatting)
]
ignore = [
    "E501",   # line too long â€” line-length handles this
    "B008",   # function calls in argument defaults (common in dataclasses)
    "SIM108", # ternary vs if/else â€” readability call, leave to author
    "SIM105", # contextlib.suppress vs try/except/pass â€” try/except is clearer
    "SIM113", # use enumerate â€” doesn't apply when loop filter/counter diverge
    "D105",   # magic methods â€” document only meaningful ones by policy
    "D107",   # constructor params live on the class docstring (merge_init_into_class)
    "D401",   # descriptive API summaries beat forced imperative mood
]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011", "D", "E402"]  # allow `assert`; tests don't need docstrings
"examples/**/*" = ["E402", "D"]  # imports after module-level code; examples are prose-documented
# Optional-dep imports at module bottom are intentional (conditional availability)
"myogestic/outputs/__init__.py" = ["E402"]
"myogestic/sources/__init__.py" = ["E402"]
